# Defaults applied to every post under posts/
# Anything here can be overridden in an individual post's front matter.

freeze: auto

format:
  html:
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    fig-cap-location: bottom
    fig-align: center

# Show author + date block at the top of each post
title-block-banner: false
author:
  - name: Pablo Ibieta
    url: https://pibieta.github.io
    affiliation: ""

# Default execution engine — change per-post if you prefer knitr (R)
jupyter: python3
